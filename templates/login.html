{{define "Login"}}

    {{template "_head"}}
<body>

    {{template "_header"}}

    <main class="secao container">
        <form
            class="cartao-formulario"
            action="#"
            method="post"
            novalidate="novalidate">
            <div class="cartao-formulario__cabecalho">
                <img
                    src="/static/assets/logo-toto.png"
                    alt="Totó"
                    class="cartao-formulario__logo">
                    <h1>Bem-vindo de volta</h1>
                    <p>Entre para acessar e gerenciar suas receitas.</p>
                </div>

                <div class="grupo-campo">
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="voce@exemplo.com"
                        autocomplete="email"
                        required="required"></div>

                    <div class="grupo-campo">
                        <label for="senha">Senha</label>
                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            placeholder="Sua senha"
                            autocomplete="current-password"
                            required="required"></div>

                        <div
                            class="grupo-campo checkbox-linha"
                            style="justify-content: space-between; display:flex;">
                            <span class="checkbox-linha">
                                <input type="checkbox" id="lembrar" name="lembrar">
                                    <label for="lembrar">Lembrar de mim</label>
                                </span>
                                <a href="#" class="link-secundario" style="font-size:0.85rem;">Esqueci minha senha</a>
                            </div>

                            <div class="acoes-formulario">
                                <button type="submit" class="botao botao--primario botao--largo">Entrar</button>
                                <!-- <p class="link-secundario">Ainda não tem conta?
                                    <a href="/cadastro">Criar conta</a> -->
                                    <p class="link-secundario">No momento, somente administradores do site.</p>
                                </p>
                            </div>
                        </form>
                    </main>

                    {{template "_footer"}}

                </body>
            </html>
        {{end}}
